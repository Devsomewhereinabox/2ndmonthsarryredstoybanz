<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Monthsarry</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="background-text"></div>

    <main id="main-content">
        <h1 class="main-title">Happy 2nd Monthsary</h1>
        <p class="date-caption">June 14, 2026</p>
        <button id="love-button" class="btn">I love you</button>
    </main>

    <section id="poem-content" class="hidden">
        <button id="close-button" aria-label="Close Poem">&times;</button>
        <div class="poem-wrapper">
            <p id="poem-text"></p>
            <div class="poem-meta">
                <span id="poem-title"></span>
                <span id="poem-author"></span>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
